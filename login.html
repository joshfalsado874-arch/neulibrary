<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library Portal • Northeastern University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

   <!-- Admin Icon -->
    <a href="admin.html" class="admin-icon" title="Admin Panel">
        <i class="fas fa-user-shield"></i>
    </a>
    
    <!-- Particle Background -->
    <canvas id="particles"></canvas>
    
    <!-- Main Container -->
    <div class="app-container">
        <!-- Floating Particles -->
        <div class="floating-particles">
            <div class="particle" style="--delay: 0s; --size: 60px;"></div>
            <div class="particle" style="--delay: 1s; --size: 40px;"></div>
            <div class="particle" style="--delay: 2s; --size: 80px;"></div>
            <div class="particle" style="--delay: 3s; --size: 50px;"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Header -->
            <div class="card-header">
                <div class="logo-container">
                    <div class="logo">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <div class="neu-badge">
                        <span>NEU</span>
                    </div>
                </div>
                <h1 class="gradient-text">
                    Library Portal
                </h1>
                <p class="subtitle">Access 50K+ Academic Resources</p>
            </div>

            <!-- Form -->
            <form id="libraryLoginForm" class="login-form">
                <!-- Email Field -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="student@neu.edu.ph"
                            pattern=".+@neu\.edu\.ph$"
                            title="Email must end with @neu.edu.ph"
                            required
                        >
                        <label>Email <span class="domain-req">(@neu.edu.ph only)</span></label>
                    </div>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <label>Password</label>
                        <i class="fas fa-eye-slash toggle-password" id="togglePassword" tabindex="0"></i>
                    </div>
                </div>

                <!-- Submit Button -->
                <button id="loginBtn" type="submit" class="gradient-btn">
                    <span class="btn-content">
                        <i class="fas fa-sign-in-alt"></i>
                        <span class="btn-text">Enter Library</span>
                    </span>
                    <div class="btn-glow"></div>
                </button>
            </form> 

            <!-- Register Link -->
            <div class="register-link">
                <p>Don't have an account yet? <a href="register.html">Register here</a></p>
            </div>

            <!-- Footer -->
            <div class="card-footer">
                <p><i class="fas fa-shield-alt"></i> Secure • New Era University</p>
            </div>
        </div>

        <!-- Toast Container -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loader">
                <div class="loader-circle"></div>
                <div class="loader-text">Authenticating...</div>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
