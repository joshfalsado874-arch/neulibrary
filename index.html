<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEU Library - Visitor Management System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="index-page">
    <div class="hero">
        <div class="container">
            <header class="header">
                <h1><i class="fas fa-book-open"></i> NEU Library</h1>
                <p>Advanced Visitor Management System</p>
            </header>

            <div class="hero-content">
                <div class="hero-text">
                    <h2>Smart Visitor Tracking</h2>
                    <p>Check-in, check-out, and real-time analytics for efficient library management.</p>
                    <div class="cta-buttons">
                        <a href="login.html" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Get Started
                        </a>
                        <a href="register.html" class="btn btn-secondary">
                            <i class="fas fa-user-plus"></i> Create Account
                        </a>
                    </div>
                </div>
                <div class="hero-stats">
                    <div class="stat-item">
                        <div class="stat-number">24/7</div>
                        <div class="stat-label">Available</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">100%</div>
                        <div class="stat-label">Secure</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">Real-time</div>
                        <div class="stat-label">Tracking</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
